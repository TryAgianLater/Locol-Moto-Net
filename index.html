<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMotoHub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="google-sheets-integration.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to LocalMotoHub</h1>
    </header>
    <section id="overview">
        <h2>System Overview</h2>
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </section>
    <section id="class-structure">
        <h2>Class Structure</h2>
        <p>Details about class structure...</p>
    </section>
    <section id="leaderboard">
        <h2>Leaderboard</h2>
        <div id="leaderboard-data"></div>
    </section>
    <section id="local-charter">
        <h2>Local Charter</h2>
        <p>Information about local charter...</p>
    </section>
    <section id="trails">
        <h2>Trails</h2>
        <p>Details about trails...</p>
    </section>
    <section id="submission-form">
        <h2>Submission Form</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Submission" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 LocalMotoHub</p>
    </footer>
</body>
</html>
