<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMotoHub - Rider Rankings</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); color: #e0e0e0;}
        header {background: linear-gradient(135deg, #1a1f3a 0%, #2d1b4e 100%); border-bottom: 3px solid #ff6b35; padding: 40px 20px; text-align: center;}
        header h1 {font-size: 3rem; color: #ff6b35; font-weight: 900; text-transform: uppercase;}
        .container {max-width: 1200px; margin: 0 auto; padding: 0 20px;}
        section {margin: 60px 0;}
        section h2 {font-size: 2rem; color: #ff6b35; margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px solid #ff6b35; padding-bottom: 15px;}
        table {width: 100%; border-collapse: collapse; background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%); border-radius: 8px; overflow: hidden;}
        table th {background: linear-gradient(135deg, #ff6b35 0%, #ff8a50 100%); color: #fff; padding: 15px; text-align: left; font-weight: 700; text-transform: uppercase;}
        table td {padding: 15px; border-bottom: 1px solid #2d3748;}
        table tr:hover {background: rgba(255, 107, 53, 0.1);}
        .rank-badge {display: inline-block; width: 30px; height: 30px; border-radius: 50%; text-align: center; line-height: 30px; font-weight: 700; background: #2d3748; color: #64b5f6;}
        .rank-1 {background: #ffd700 !important; color: #333 !important;}
        .rank-2 {background: #c0c0c0 !important; color: #333 !important;}
        .rank-3 {background: #cd7f32 !important; color: #fff !important;}
        .tabs {display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab {padding: 10px 20px; background: #16213e; border: 2px solid #64b5f6; color: #64b5f6; cursor: pointer; border-radius: 4px; transition: all 0.3s; font-weight: 600;}
        .tab.active {background: #ff6b35; color: #fff; border-color: #ff6b35;}
        footer {background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); border-top: 2px solid #ff6b35; padding: 30px 20px; text-align: center; color: #90caf9; margin-top: 80px;}
    </style>
</head>
<body>
<header>
    <h1>🏁 LocalMotoHub</h1>
</header>

<div class="container">
    <section id="overall">
        <h2>🏁 Overall Rankings</h2>
        <div id="overallTable"></div>
    </section>

    <section id="classes">
        <h2>🏍️ Class Rankings</h2>
        <div class="tabs" id="classTabs"></div>
        <div id="classTable"></div>
    </section>
</div>

<footer>
    <p>🏁 LocalMotoHub • Community Driven • Last Updated: <span id="lastUpdate">Loading...</span></p>
</footer>

<script>
const SHEET_ID = '1tODOyMqbz19BNXx_5JUMDXuhtScJolN--qCwMIBHh-0';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=html`;

let allData = [];
let classData = {};

async function loadData() {
    try {
        const response = await fetch(SHEET_URL);
        const html = await response.text();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const table = doc.querySelector('table');
        
        if (!table) return;
        
        const rows = table.querySelectorAll('tbody tr');
        allData = [];
        
        // Parse overall rankings (columns B-J)
        rows.forEach((row, idx) => {
            const cells = row.querySelectorAll('td');
            if (cells.length < 10 || idx === 0) return;
            
            const rating = parseInt(cells[1]?.textContent?.trim()) || 0;
            const name = cells[2]?.textContent?.trim() || '';
            
            if (rating && name) {
                allData.push({
                    rating: rating,
                    name: name,
                    number: cells[3]?.textContent?.trim() || '',
                    controlH: parseInt(cells[4]?.textContent?.trim()) || 0,
                    controlL: parseInt(cells[5]?.textContent?.trim()) || 0,
                    adaptability: parseInt(cells[6]?.textContent?.trim()) || 0,
                    experience: parseInt(cells[7]?.textContent?.trim()) || 0,
                    pace: parseInt(cells[8]?.textContent?.trim()) || 0,
                    mainBike: cells[9]?.textContent?.trim() || ''
                });
            }
        });
        
        allData.sort((a, b) => b.rating - a.rating);
        
        // Parse classes
        const classes = {
            '450 Class': {col: 13},
            '250 Class': {col: 17},
            '210-145 Class': {col: 21},
            '150-85 Class': {col: 25},
            '80< Class': {col: 29},
            'Open Class': {col: 33}
        };
        
        Object.entries(classes).forEach(([name, {col}]) => {
            classData[name] = [];
            rows.forEach((row, idx) => {
                if (idx === 0) return;
                const cells = row.querySelectorAll('td');
                if (cells.length > col + 2) {
                    const pos = cells[col]?.textContent?.trim();
                    const dName = cells[col + 1]?.textContent?.trim();
                    const bike = cells[col + 2]?.textContent?.trim();
                    
                    if (pos && pos !== 'POS' && dName && dName !== 'Name') {
                        classData[name].push({position: parseInt(pos) || 0, name: dName, bike: bike || ''});
                    }
                }
            });
        });
        
        renderAll();
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
    } catch (error) {
        console.error('Error loading data:', error);
    }
}

function renderAll() {
    renderOverall();
    renderClassTabs();
}

function renderOverall() {
    let html = '<table><thead><tr><th>Rank</th><th>Rating</th><th>Name</th><th>Number</th><th>Control H</th><th>Control L</th><th>Adapt</th><th>Exp</th><th>Pace</th><th>Bike</th></tr></thead><tbody>';
    
    allData.forEach((rider, idx) => {
        const rankClass = idx < 3 ? `rank-${idx + 1}` : '';
        html += `<tr>
            <td><span class="rank-badge ${rankClass}">${idx + 1}</span></td>
            <td><strong style="color: #ff6b35;">${rider.rating}</strong></td>
            <td>${rider.name}</td>
            <td>${rider.number}</td>
            <td>${rider.controlH}</td>
            <td>${rider.controlL}</td>
            <td>${rider.adaptability}</td>
            <td>${rider.experience}</td>
            <td>${rider.pace}</td>
            <td>${rider.mainBike}</td>
        </tr>`;
    });
    
    html += '</tbody></table>';
    document.getElementById('overallTable').innerHTML = html;
}

function renderClassTabs() {
    let tabsHtml = '';
    Object.keys(classData).forEach((className, idx) => {
        tabsHtml += `<button class="tab ${idx === 0 ? 'active' : ''}" onclick="showClass('${className}')">${className}</button>`;
    });
    document.getElementById('classTabs').innerHTML = tabsHtml;
    showClass(Object.keys(classData)[0]);
}

function showClass(className) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
    
    const data = classData[className] || [];
    let html = '<table><thead><tr><th>Pos</th><th>Name</th><th>Bike</th></tr></thead><tbody>';
    
    data.forEach((rider, idx) => {
        const rankClass = idx < 3 ? `rank-${idx + 1}` : '';
        html += `<tr><td><span class="rank-badge ${rankClass}">${rider.position}</span></td><td>${rider.name}</td><td>${rider.bike}</td></tr>`;
    });
    
    html += '</tbody></table>';
    document.getElementById('classTable').innerHTML = html;
}

window.addEventListener('DOMContentLoaded', loadData);
setInterval(loadData, 43200000);
</script>
</body>
</html>
