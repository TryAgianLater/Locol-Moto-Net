<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Moto Hub</title>
    <script>
        const SHEET_ID = 'your_google_sheet_id';
        const API_KEY = 'your_google_sheets_api_key';

        async function fetchSheetData() {
            try {
                // Fetch data from Google Sheets
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1?key=${API_KEY}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                parseData(data.values);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function parseData(rows) {
            const overallRankings = document.getElementById('overall-rankings');
            const classLeaderboards = document.getElementById('class-leaderboards');
            overallRankings.innerHTML = '';
            classLeaderboards.innerHTML = '';

            // Assuming the first row is the header
            const header = rows[0];
            rows.slice(1).forEach(row => {
                const rank = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    rank.appendChild(td);
                });
                overallRankings.appendChild(rank);
                // Add logic for class-specific leaderboards if needed
            });
            console.log('Data parsed successfully');
        }

        function startAutoRefresh(interval) {
            setInterval(fetchSheetData, interval);
            console.log('Auto-refresh set for every ' + (interval / 1000) + ' seconds.');
        }

        window.onload = () => {
            fetchSheetData();
            startAutoRefresh(30000); // Refresh every 30 seconds
        };
    </script>
</head>
<body>
    <h1>Local Moto Hub</h1>
    <h2>Overall Rankings</h2>
    <table id="overall-rankings" border="1"><tr><th>Position</th><th>Rider</th><th>Points</th></tr></table>
    <h2>Class Leaderboards</h2>
    <table id="class-leaderboards" border="1"><tr><th>Class</th><th>Rider</th><th>Points</th></tr></table>
</body>
</html>
