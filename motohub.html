<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoHub — Find Trails. Chase Records. Ride More.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   MOTOHUB DESIGN SYSTEM — WEST TEXAS MOTORSPORT EDITORIAL
   ═══════════════════════════════════════════════════════════════ */

:root {
  --black:       #0D0D0D;
  --surface-1:   #111111;
  --surface-2:   #171717;
  --surface-3:   #1E1E1E;
  --surface-4:   #242424;
  --border:      rgba(255,255,255,0.07);
  --border-med:  rgba(255,255,255,0.12);
  --orange:      #FF6B00;
  --orange-dim:  rgba(255,107,0,0.15);
  --orange-glow: rgba(255,107,0,0.35);
  --white:       #FFFFFF;
  --gray-1:      #F0EDE8;
  --gray-2:      #B8B3AC;
  --gray-3:      #7A7570;
  --gray-4:      #3A3530;
  --sand:        #C8B89A;
  --caliche:     #D4C4A8;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;
  --font-body:    'Barlow', sans-serif;
  --nav-h:       64px;
  --radius:      6px;
  --radius-lg:   12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--gray-1);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: default;
}

/* Grain overlay — West Texas grit */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.022;
  pointer-events: none;
  z-index: 9999;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: var(--font-body); }
img { display: block; max-width: 100%; }

/* Typography scale */
.t-display   { font-family: var(--font-display); letter-spacing: 0.02em; }
.t-mono      { font-family: var(--font-mono); }
.t-label     { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: var(--gray-3); }
.t-orange    { color: var(--orange); }
.t-sand      { color: var(--sand); }
.t-muted     { color: var(--gray-3); }
.t-dim       { color: var(--gray-2); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface-1); }
::-webkit-scrollbar-thumb { background: var(--gray-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--orange); }

/* ═══════════════════════
   NAVIGATION
   ═══════════════════════ */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(13,13,13,0.88);
  backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 40px;
  z-index: 1000;
  transition: border-color 0.3s;
}

#nav.scrolled { border-bottom-color: var(--border-med); }

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-logo-mark {
  width: 32px;
  height: 32px;
  background: var(--orange);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--black);
  letter-spacing: 0;
}

.nav-logo-text {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--white);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}

.nav-link {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-2);
  border-radius: var(--radius);
  transition: all 0.2s;
  background: none;
  border: none;
}

.nav-link:hover, .nav-link.active {
  color: var(--white);
  background: rgba(255,255,255,0.06);
}

.nav-link.active { color: var(--orange); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
}

.nav-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--orange) 0%, #cc5500 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--black);
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.nav-avatar:hover { border-color: var(--orange); }

/* Mobile hamburger */
.nav-hamburger {
  display: none;
  background: none;
  border: none;
  flex-direction: column;
  gap: 5px;
  padding: 4px;
  margin-left: auto;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--gray-1);
  border-radius: 2px;
  transition: all 0.3s;
}

.mobile-menu {
  display: none;
  position: fixed;
  top: var(--nav-h);
  left: 0; right: 0;
  background: rgba(13,13,13,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  z-index: 999;
  flex-direction: column;
  gap: 4px;
}

.mobile-menu.open { display: flex; }
.mobile-nav-link {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-2);
  border-radius: var(--radius);
  background: none;
  border: none;
  text-align: left;
  transition: all 0.2s;
}
.mobile-nav-link:hover { color: var(--white); background: rgba(255,255,255,0.06); }

@media (max-width: 768px) {
  .nav-links, .nav-right { display: none; }
  .nav-hamburger { display: flex; }
  #nav { padding: 0 20px; }
}

/* ═══════════════════════
   APP SHELL
   ═══════════════════════ */
#app {
  min-height: 100vh;
  padding-top: var(--nav-h);
}

.page { min-height: calc(100vh - var(--nav-h)); }

/* ═══════════════════════
   BUTTONS
   ═══════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-radius: var(--radius);
  border: none;
  transition: all 0.2s;
  cursor: pointer;
  white-space: nowrap;
}

.btn-primary {
  background: var(--orange);
  color: var(--black);
}
.btn-primary:hover {
  background: #ff7a1a;
  transform: translateY(-1px);
  box-shadow: 0 8px 24px var(--orange-glow);
}

.btn-outline {
  background: transparent;
  color: var(--white);
  border: 1px solid var(--border-med);
}
.btn-outline:hover {
  border-color: var(--orange);
  color: var(--orange);
  transform: translateY(-1px);
}

.btn-ghost {
  background: rgba(255,255,255,0.06);
  color: var(--gray-1);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: rgba(255,255,255,0.1);
  color: var(--white);
}

.btn-sm {
  padding: 8px 18px;
  font-size: 11px;
}

/* ═══════════════════════
   CARDS / GLASS
   ═══════════════════════ */
.glass-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(10px);
  transition: all 0.3s;
}
.glass-card:hover {
  border-color: var(--border-med);
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}

.surface-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all 0.25s;
}

/* ═══════════════════════
   DIFFICULTY BADGES
   ═══════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.badge-beginner   { background: rgba(34,197,94,0.15);  color: #4ade80; }
.badge-intermediate { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge-advanced   { background: rgba(239,68,68,0.15);  color: #f87171; }
.badge-expert     { background: rgba(168,85,247,0.15); color: #c084fc; }
.badge-orange     { background: var(--orange-dim); color: var(--orange); }

/* Terrain indicator dot */
.terrain-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  display: inline-block;
}

/* ═══════════════════════
   SECTION HEADERS
   ═══════════════════════ */
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  gap: 16px;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 52px);
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--white);
}
.section-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 8px;
}
.section-subtitle { color: var(--gray-2); font-size: 14px; }

/* Container */
.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 768px) {
  .container { padding: 0 20px; }
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 0;
}

/* Orange accent bar */
.accent-bar {
  width: 40px;
  height: 3px;
  background: var(--orange);
  margin-bottom: 16px;
}

/* Star rating */
.stars { color: var(--orange); letter-spacing: 2px; }

/* ═══════════════════════
   GRID SYSTEMS
   ═══════════════════════ */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }

@media (max-width: 1024px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
}

/* Flex utilities */
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-24 { gap: 24px; }

/* Spacing */
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mt-32 { margin-top: 32px; }
.mt-48 { margin-top: 48px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.mb-32 { margin-bottom: 32px; }
.p-24 { padding: 24px; }
.p-32 { padding: 32px; }

/* ═══════════════════════
   HOME PAGE
   ═══════════════════════ */

/* HERO */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: var(--black);
}

/* Animated desert/trail canvas background */
.hero-canvas-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
}
#hero-canvas {
  width: 100%;
  height: 100%;
  opacity: 0.55;
}

/* Diagonal accent */
.hero-diagonal {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 45%;
  background: linear-gradient(135deg, transparent 0%, rgba(255,107,0,0.04) 100%);
  clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  width: 100%;
}

.hero-inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  padding-top: 60px;
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--orange-dim);
  border: 1px solid rgba(255,107,0,0.3);
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 28px;
  animation: fadeUp 0.7s ease both;
}

.hero-tag-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--orange);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hero-headline {
  font-family: var(--font-display);
  font-size: clamp(64px, 10vw, 140px);
  line-height: 0.92;
  letter-spacing: 0.02em;
  color: var(--white);
  animation: fadeUp 0.8s 0.1s ease both;
}

.hero-headline .line-orange { color: var(--orange); }

.hero-sub {
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 300;
  color: var(--gray-2);
  margin-top: 24px;
  max-width: 480px;
  letter-spacing: 0.02em;
  animation: fadeUp 0.8s 0.2s ease both;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 40px;
  flex-wrap: wrap;
  animation: fadeUp 0.8s 0.3s ease both;
}

.hero-scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray-3);
  animation: fadeUp 1s 0.6s ease both;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--orange), transparent);
  animation: scrollPulse 2s infinite;
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.hero-stats-strip {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 48px;
  animation: fadeUp 0.9s 0.4s ease both;
  flex-wrap: wrap;
}

.hero-stat-item { display: flex; flex-direction: column; gap: 4px; }
.hero-stat-num {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--white);
  line-height: 1;
}
.hero-stat-num .counter-num { color: var(--orange); }
.hero-stat-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-3);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* STATS SECTION */
.stats-section {
  padding: 80px 0;
  background: var(--surface-1);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: var(--border);
}

.stat-block {
  background: var(--surface-1);
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.stat-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 0;
  background: var(--orange);
  transition: height 0.5s ease;
}
.stat-block.visible::before { height: 100%; }

.stat-number {
  font-family: var(--font-display);
  font-size: 64px;
  color: var(--white);
  line-height: 1;
  letter-spacing: 0.02em;
}
.stat-unit { color: var(--orange); }
.stat-label { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray-3); font-weight: 600; }
.stat-sub { font-size: 12px; color: var(--gray-3); font-style: italic; }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-block { padding: 32px 24px; }
  .stat-number { font-size: 48px; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
}

/* FEATURED TRAILS */
.trails-section { padding: 100px 0; }

.trail-card {
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  display: flex;
  flex-direction: column;
}
.trail-card:hover {
  border-color: var(--orange);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--orange-dim);
}

.trail-card-img {
  position: relative;
  height: 200px;
  overflow: hidden;
  background: var(--surface-3);
}

.trail-card-img canvas {
  width: 100%;
  height: 100%;
}

.trail-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,13,13,0.9) 0%, transparent 60%);
}

.trail-card-badge {
  position: absolute;
  top: 12px;
  right: 12px;
}

.trail-card-body {
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.trail-card-name {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: 0.04em;
  color: var(--white);
  line-height: 1;
}

.trail-card-meta {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--gray-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.trail-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.trail-fastest {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.trail-fastest-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-3); }
.trail-fastest-time  { font-family: var(--font-mono); font-size: 14px; color: var(--orange); font-weight: 600; }

/* RECENT RECORDS */
.records-section { padding: 80px 0; background: var(--surface-1); border-top: 1px solid var(--border); }

.record-row {
  display: grid;
  grid-template-columns: 40px 1fr 180px 160px 120px;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-radius: var(--radius);
  transition: background 0.2s;
  cursor: pointer;
}
.record-row:hover { background: rgba(255,255,255,0.03); }
.record-row + .record-row { border-top: 1px solid var(--border); }

.record-rank {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--gray-3);
  font-weight: 500;
}
.record-rank.gold   { color: #F5C842; }
.record-rank.silver { color: #B4B4B4; }
.record-rank.bronze { color: #CD7F32; }

.record-rider { display: flex; align-items: center; gap: 12px; }
.record-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--black);
  font-weight: 700;
  flex-shrink: 0;
}
.record-rider-name { font-weight: 600; font-size: 14px; color: var(--gray-1); }
.record-rider-loc  { font-size: 11px; color: var(--gray-3); }
.record-trail { font-size: 13px; color: var(--gray-2); }
.record-bike  { font-size: 12px; color: var(--gray-3); font-family: var(--font-mono); }
.record-time  { font-family: var(--font-mono); font-size: 16px; color: var(--orange); font-weight: 600; text-align: right; }

@media (max-width: 1024px) {
  .record-row { grid-template-columns: 30px 1fr 1fr 100px; }
  .record-bike { display: none; }
}
@media (max-width: 640px) {
  .record-row { grid-template-columns: 24px 1fr 90px; }
  .record-trail { display: none; }
}

/* ═══════════════════════
   TRAILS PAGE
   ═══════════════════════ */
.trails-page { padding: 60px 0 100px; }
.trails-page-hero {
  padding: 60px 0 48px;
  background: var(--surface-1);
  border-bottom: 1px solid var(--border);
  margin-bottom: 60px;
}

.trails-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 32px;
}
.filter-btn {
  padding: 8px 18px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: none;
  color: var(--gray-2);
  transition: all 0.2s;
  cursor: pointer;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-dim);
}

.trails-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
@media (max-width: 1024px) { .trails-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px)  { .trails-grid { grid-template-columns: 1fr; } }

/* ═══════════════════════
   TRAIL MAP PAGE
   ═══════════════════════ */
.map-page {
  height: calc(100vh - var(--nav-h));
  display: flex;
  flex-direction: column;
}

.map-toolbar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.map-search {
  flex: 1;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
}

.map-search input {
  background: none;
  border: none;
  outline: none;
  color: var(--gray-1);
  font-family: var(--font-body);
  font-size: 13px;
  flex: 1;
}
.map-search input::placeholder { color: var(--gray-3); }

.map-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

#leaflet-map {
  flex: 1;
  background: #111;
}

.map-sidebar {
  width: 380px;
  background: var(--surface-1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s;
  flex-shrink: 0;
}

.map-sidebar.hidden { display: none; }

.map-sidebar-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.map-sidebar-close {
  background: none;
  border: none;
  color: var(--gray-3);
  font-size: 20px;
  line-height: 1;
  padding: 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: color 0.2s;
}
.map-sidebar-close:hover { color: var(--white); }

.map-sidebar-body { padding: 24px; overflow-y: auto; flex: 1; }

.map-trail-stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin: 20px 0;
}
.map-trail-stat {
  background: var(--surface-2);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.map-trail-stat-val {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--orange);
  font-weight: 600;
}
.map-trail-stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--gray-3);
  font-weight: 600;
}

.map-trail-desc { font-size: 13px; color: var(--gray-2); line-height: 1.7; }

.map-sidebar-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

@media (max-width: 900px) {
  .map-sidebar {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    z-index: 10;
    width: 100%;
    max-width: 380px;
  }
}

/* Leaflet dark overrides */
.leaflet-container { background: #0a0a0a !important; }
.leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.9) saturate(1.2); }
.leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: var(--radius) !important; overflow: hidden; }
.leaflet-control-zoom a { background: var(--surface-2) !important; color: var(--gray-1) !important; border: none !important; border-bottom: 1px solid var(--border) !important; }
.leaflet-control-zoom a:hover { background: var(--surface-3) !important; color: var(--orange) !important; }
.leaflet-control-attribution { background: rgba(13,13,13,0.7) !important; color: var(--gray-3) !important; }
.leaflet-control-attribution a { color: var(--gray-3) !important; }
.leaflet-popup-content-wrapper { background: var(--surface-2) !important; border: 1px solid var(--border) !important; color: var(--gray-1) !important; border-radius: var(--radius-lg) !important; box-shadow: 0 20px 60px rgba(0,0,0,0.6) !important; }
.leaflet-popup-tip { background: var(--surface-2) !important; }
.leaflet-popup-content { margin: 14px 18px !important; }

/* ═══════════════════════
   LEADERBOARDS PAGE
   ═══════════════════════ */
.leaderboards-page { padding: 60px 0 100px; }

.lb-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
  overflow-x: auto;
}
.lb-tab {
  padding: 14px 24px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.lb-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.lb-tab:hover:not(.active) { color: var(--gray-1); }

.lb-table {
  width: 100%;
  border-collapse: collapse;
}
.lb-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-3);
  border-bottom: 1px solid var(--border);
}
.lb-table td {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--gray-1);
}
.lb-table tbody tr {
  transition: background 0.15s;
  cursor: pointer;
}
.lb-table tbody tr:hover { background: rgba(255,255,255,0.02); }

.lb-pos {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--gray-3);
  font-weight: 500;
  width: 50px;
}
.lb-pos.p1 { color: #F5C842; font-weight: 700; }
.lb-pos.p2 { color: #B4B4B4; }
.lb-pos.p3 { color: #CD7F32; }

.lb-rider-cell { display: flex; align-items: center; gap: 12px; }
.lb-time { font-family: var(--font-mono); color: var(--orange); font-weight: 600; font-size: 15px; }
.lb-change { font-family: var(--font-mono); font-size: 11px; }
.lb-change.up   { color: #4ade80; }
.lb-change.down { color: #f87171; }
.lb-change.same { color: var(--gray-3); }

/* ═══════════════════════
   COMMUNITY PAGE
   ═══════════════════════ */
.community-page { padding: 60px 0 100px; }

.community-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 32px;
}
@media (max-width: 1024px) {
  .community-layout { grid-template-columns: 1fr; }
}

.post-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.25s;
  cursor: pointer;
}
.post-card:hover { border-color: var(--border-med); transform: translateY(-2px); }
.post-card + .post-card { margin-top: 20px; }

.post-header { padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; }
.post-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--black);
  flex-shrink: 0;
}

.post-meta { flex: 1; }
.post-username { font-size: 14px; font-weight: 600; color: var(--white); }
.post-time { font-size: 11px; color: var(--gray-3); margin-top: 1px; }
.post-badge { margin-left: auto; }

.post-body { padding: 16px 24px; font-size: 14px; color: var(--gray-2); line-height: 1.7; }
.post-body strong { color: var(--gray-1); }

.post-image-placeholder {
  height: 220px;
  background: var(--surface-3);
  position: relative;
  overflow: hidden;
}
.post-image-placeholder canvas { width: 100%; height: 100%; }

.post-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
}
.post-action {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--gray-3);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: none;
  border: none;
  cursor: pointer;
  transition: color 0.2s;
  padding: 4px 8px;

}
.post-action:hover { color: var(--orange); background: var(--orange-dim); }
.post-action.liked { color: var(--orange); }

.post-trail-tag {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--gray-3);
  background: var(--surface-3);
  padding: 4px 10px;
  border-radius: 3px;
  font-family: var(--font-mono);
}

.community-sidebar-section {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);

  margin-bottom: 20px;
}

.sidebar-section-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-2);
}

.sidebar-rider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  transition: background 0.15s;
  cursor: pointer;
}
.sidebar-rider-row:hover { background: rgba(255,255,255,0.03); }
.sidebar-rider-row + .sidebar-rider-row { border-top: 1px solid var(--border); }
.sidebar-rider-name { font-size: 13px; font-weight: 600; color: var(--gray-1); flex: 1; }
.sidebar-rider-stat { font-family: var(--font-mono); font-size: 11px; color: var(--orange); }

/* ═══════════════════════
   GARAGE PAGE
   ═══════════════════════ */
.garage-page { padding: 60px 0 100px; }

.garage-hero {
  padding: 60px 0 48px;
  background: var(--surface-1);
  border-bottom: 1px solid var(--border);
  margin-bottom: 60px;
}

.garage-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 32px;
}
@media (max-width: 900px) { .garage-layout { grid-template-columns: 1fr; } }

.garage-rider-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: sticky;
  top: calc(var(--nav-h) + 20px);
}

.garage-rider-banner {
  height: 80px;
  background: linear-gradient(135deg, #1a0a00, #2d1100);
  position: relative;
  overflow: hidden;
}
.garage-rider-banner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 6px,
    rgba(255,107,0,0.06) 6px,
    rgba(255,107,0,0.06) 7px
  );
}

.garage-rider-info { padding: 0 20px 20px; margin-top: -28px; position: relative; z-index: 1; }

.garage-rider-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 3px solid var(--surface-2);
  background: linear-gradient(135deg, var(--orange), #cc5500);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--black);
  margin-bottom: 12px;
}

.garage-rider-name { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.04em; color: var(--white); }
.garage-rider-handle { font-size: 12px; color: var(--gray-3); font-family: var(--font-mono); margin-top: 2px; }
.garage-rider-location { font-size: 12px; color: var(--gray-3); margin-top: 8px; display: flex; align-items: center; gap: 4px; }

.garage-rider-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  margin-top: 20px;
  border-radius: var(--radius);
  overflow: hidden;
}
.garage-rider-stat { background: var(--surface-3); padding: 12px 14px; }
.garage-rider-stat-num { font-family: var(--font-mono); font-size: 18px; color: var(--orange); font-weight: 600; }
.garage-rider-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gray-3); margin-top: 2px; }

.garage-bike-list { display: flex; flex-direction: column; gap: 20px; }

.bike-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.3s;
  cursor: pointer;
}
.bike-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

.bike-card-img {
  height: 180px;
  background: var(--surface-3);
  position: relative;
  overflow: hidden;
}
.bike-card-img canvas { width: 100%; height: 100%; }

.bike-card-body { padding: 20px; }
.bike-card-year { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; }
.bike-card-name { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.04em; color: var(--white); line-height: 1; }
.bike-card-mods-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-3); margin-top: 14px; margin-bottom: 6px; }

.bike-mod-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 11px;
  color: var(--gray-2);
  margin: 2px;
}

.bike-card-stats {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.bike-stat-item { display: flex; flex-direction: column; gap: 2px; }
.bike-stat-val { font-family: var(--font-mono); font-size: 15px; color: var(--gray-1); font-weight: 600; }
.bike-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gray-3); }

/* ═══════════════════════
   PROFILE PAGE
   ═══════════════════════ */
.profile-page { padding-bottom: 100px; }

.profile-banner {
  height: 240px;
  background: linear-gradient(135deg, #0D0D0D 0%, #1a0a00 50%, #0D0D0D 100%);
  position: relative;
  overflow: hidden;
}
.profile-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 10px,
    rgba(255,107,0,0.04) 10px,
    rgba(255,107,0,0.04) 11px
  );
}
.profile-banner canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.4; }

.profile-main {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  margin-top: -60px;
  position: relative;
  z-index: 1;
}

.profile-header { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 40px; }

.profile-avatar {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 4px solid var(--black);
  background: linear-gradient(135deg, var(--orange), #cc5500);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 48px;
  color: var(--black);
  flex-shrink: 0;
}

.profile-info { flex: 1; padding-bottom: 4px; }
.profile-name { font-family: var(--font-display); font-size: 48px; letter-spacing: 0.04em; color: var(--white); line-height: 1; }
.profile-handle { font-family: var(--font-mono); font-size: 14px; color: var(--gray-3); margin-top: 4px; }
.profile-location { font-size: 13px; color: var(--gray-3); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.profile-bio { font-size: 14px; color: var(--gray-2); margin-top: 10px; max-width: 500px; }

.profile-actions { display: flex; gap: 10px; margin-left: auto; align-self: flex-end; padding-bottom: 4px; }

.profile-stats-bar {

}
.profile-stat { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.profile-stat-num { font-family: var(--font-mono); font-size: 24px; color: var(--white); font-weight: 600; }
.profile-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gray-3); }

.profile-content { display: grid; grid-template-columns: 1fr 320px; gap: 32px; }
@media (max-width: 1024px) { .profile-content { grid-template-columns: 1fr; } }

/* ═══════════════════════
   ADMIN PAGE
   ═══════════════════════ */
.admin-page { padding: 60px 0 100px; }

.admin-layout { display: grid; grid-template-columns: 220px 1fr; gap: 0; min-height: 600px; }

.admin-sidebar {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) 0 0 var(--radius-lg);
  padding: 24px 0;
  border-right: none;
}

.admin-sidebar-title {
  padding: 0 20px 16px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gray-3);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.admin-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  background: none;
  border-top: none;
  border-right: none;
  border-bottom: none;

.admin-nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
.admin-nav-item.active { color: var(--orange); border-left-color: var(--orange); background: var(--orange-dim); }

.admin-content {
  background: var(--surface-2);

.admin-kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);

}

.admin-kpi {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.admin-kpi-val { font-family: var(--font-display); font-size: 42px; color: var(--white); line-height: 1; }
.admin-kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gray-3); margin-top: 4px; }
.admin-kpi-trend { font-size: 11px; color: #4ade80; margin-top: 8px; font-family: var(--font-mono); }

/* ═══════════════════════
   TRAIL DETAIL PAGE
   ═══════════════════════ */
.trail-detail-page { padding-bottom: 100px; }

.trail-detail-hero {
  height: 420px;
  position: relative;
  overflow: hidden;
  background: var(--surface-2);
}
.trail-detail-hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.trail-detail-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(13,13,13,0.95) 0%, rgba(13,13,13,0.4) 50%, rgba(13,13,13,0.2) 100%);
}
.trail-detail-hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 40px 40px 32px;
}
.trail-detail-name {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 96px);
  letter-spacing: 0.04em;
  color: var(--white);
  line-height: 1;

.modal-overlay {

  background: rgba(0,0,0,0.85);

  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.hidden { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--surface-2);
  border: 1px solid var(--border-med);

  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }

.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.modal-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 0.04em; color: var(--white); }
.modal-subtitle { font-size: 12px; color: var(--gray-3); margin-top: 4px; }

.modal-body { padding: 28px; display: flex; flex-direction: column; gap: 20px; }
.modal-footer { padding: 20px 28px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; }

.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-3); }

.form-input, .form-select, .form-textarea {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--gray-1);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px var(--orange-dim);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--gray-3); }
.form-select { appearance: none; cursor: pointer; }
option { background: var(--surface-3); color: var(--gray-1); }
.form-textarea { resize: vertical; min-height: 80px; }

.time-input-group {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  align-items: center;
}
.time-sep { text-align: center; color: var(--gray-3); font-family: var(--font-mono); font-size: 18px; padding-top: 4px; }

  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  text-align: center;
  gap: 16px;

.success-icon { font-size: 48px; margin-bottom: 8px; }
.success-title { font-family: var(--font-display); font-size: 40px; letter-spacing: 0.04em; color: var(--white); }
.success-sub { font-size: 14px; color: var(--gray-2); }

/* ═══════════════════════
   FOOTER
   ═══════════════════════ */
#footer {
  background: var(--surface-1);

}

.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;

  margin-bottom: 48px;
}

@media (max-width: 560px)  { .footer-grid { grid-template-columns: 1fr; } }

.footer-col-title { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray-3); margin-bottom: 20px; }
.footer-desc { font-size: 13px; color: var(--gray-3); line-height: 1.8; max-width: 240px; margin-top: 16px; }
.footer-link { display: block; font-size: 13px; color: var(--gray-3); margin-bottom: 10px; transition: color 0.2s; cursor: pointer; background: none; border: none; text-align: left; padding: 0; }
.footer-link:hover { color: var(--orange); }

.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.footer-copy { font-size: 12px; color: var(--gray-3); }
.footer-legal { display: flex; gap: 20px; font-size: 12px; color: var(--gray-3); }
.footer-legal a { transition: color 0.2s; }
.footer-legal a:hover { color: var(--gray-1); }

/* ═══════════════════════
   TOAST NOTIFICATIONS
   ═══════════════════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 3000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  background: var(--surface-3);
  border: 1px solid var(--border-med);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  font-size: 13px;
  color: var(--gray-1);
  min-width: 240px;
  max-width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: toastIn 0.3s ease;
  border-left: 3px solid var(--orange);
}

.toast.success { border-left-color: #4ade80; }
.toast.error   { border-left-color: #f87171; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ═══════════════════════
   RESPONSIVE / MISC
   ═══════════════════════ */
.hide-mobile { }

let currentPage = 'home';
let leafletMap = null;

function navigate(page, param) {
  currentPage = page;
  closeMobileMenu();
  updateNavActive(page);
  window.scrollTo(0, 0);

  const app = document.getElementById('app');

  switch(page) {
    case 'home':         renderHome(app);           break;
    case 'trails':       renderTrails(app);         break;
    case 'map':          renderMap(app);            break;
    case 'leaderboards': renderLeaderboards(app);   break;
    case 'community':    renderCommunity(app);      break;
    case 'garage':       renderGarage(app);         break;
    case 'profile':      renderProfile(app);        break;
    case 'admin':        renderAdmin(app);          break;
    case 'trail':        renderTrailDetail(app, param); break;
    default:             renderHome(app);
  }
}

function updateNavActive(page) {
  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
}

   CANVAS DRAWING UTILS

function drawDesertScene(canvas, seed = 0) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || canvas.width || 400;
  const H = canvas.offsetHeight || canvas.height || 200;
  canvas.width = W;
  canvas.height = H;

  const rng = (s) => { let x = Math.sin(seed + s) * 10000; return x - Math.floor(x); };

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a0807');
  sky.addColorStop(0.4, '#1a0e06');
  sky.addColorStop(1, '#2d1a06');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for(let i = 0; i < 40; i++) {
    const x = rng(i*7) * W;
    const y = rng(i*13) * H * 0.5;
    const r = rng(i*3) * 1.5 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,245,220,${rng(i*5) * 0.6 + 0.3})`;
    ctx.fill();
  }

  // Mesquite silhouettes
  for(let t = 0; t < 8; t++) {
    const tx = rng(t*11) * W;
    const ty = H * (0.55 + rng(t*7) * 0.15);
    const th = H * (0.12 + rng(t*3) * 0.1);
    drawMesquite(ctx, tx, ty, th, rng(t*17));
  }

  // Ground
  const ground = ctx.createLinearGradient(0, H*0.65, 0, H);
  ground.addColorStop(0, '#1a1008');
  ground.addColorStop(1, '#0d0803');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H*0.65, W, H);

  // Trail track lines
  ctx.strokeStyle = 'rgba(255,107,0,0.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 12]);
  ctx.beginPath();
  ctx.moveTo(W*0.1, H);
  ctx.bezierCurveTo(W*0.25, H*0.7, W*0.5, H*0.85, W*0.9, H*0.72);
  ctx.stroke();
  ctx.setLineDash([]);

  // Orange horizon glow
  const glow = ctx.createRadialGradient(W*0.5, H*0.65, 0, W*0.5, H*0.65, W*0.6);
  glow.addColorStop(0, 'rgba(255,107,0,0.08)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
}

function drawMesquite(ctx, x, y, h, rng) {
  ctx.strokeStyle = 'rgba(15,12,5,0.9)';
  ctx.fillStyle = 'rgba(8,8,4,0.95)';
  // Trunk
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + (rng - 0.5) * h * 0.3, y - h * 0.5);
  ctx.stroke();
  // Branches
  for(let b = 0; b < 5; b++) {
    const bx = x + (Math.sin(b * 1.2 + rng * 5) * h * 0.6);
    const by = y - h * (0.3 + b * 0.1);
    ctx.beginPath();
    ctx.moveTo(x, y - h * 0.3);
    ctx.quadraticCurveTo(x + (rng - 0.5) * h * 0.4, y - h * 0.6, bx, by - h * 0.2);
    ctx.lineWidth = 1;
    ctx.stroke();
    // Leaf cluster
    ctx.beginPath();
    ctx.arc(bx, by - h * 0.2, h * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(10,14,6,0.9)';
    ctx.fill();
  }
}

function drawBikeIllustration(canvas, color='#FF6B00', seed=0) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || canvas.width;
  const H = canvas.offsetHeight || canvas.height;
  canvas.width = W;
  canvas.height = H;

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#141008');
  bg.addColorStop(1, '#0a0805');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Bike silhouette (simplified)
  const cx = W * 0.5;
  const cy = H * 0.6;
  const scale = Math.min(W, H) * 0.0025;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.4);
  glow.addColorStop(0, `${color}18`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Wheels
  ctx.lineWidth = 3 * scale;
  const wr = 35 * scale;
  const fw = {x: cx + 55*scale, y: cy};
  const rw = {x: cx - 55*scale, y: cy};

  [fw, rw].forEach(w => {
    ctx.beginPath();
    ctx.arc(w.x, w.y, wr, 0, Math.PI*2);
    ctx.strokeStyle = color;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(w.x, w.y, wr * 0.25, 0, Math.PI*2);
    ctx.strokeStyle = `${color}80`;
    ctx.stroke();
    // Spokes
    for(let s = 0; s < 8; s++) {
      const angle = s * Math.PI / 4;
      ctx.beginPath();
      ctx.moveTo(w.x + Math.cos(angle) * wr * 0.25, w.y + Math.sin(angle) * wr * 0.25);
      ctx.lineTo(w.x + Math.cos(angle) * wr * 0.9, w.y + Math.sin(angle) * wr * 0.9);
      ctx.strokeStyle = `${color}40`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  });

  // Frame
  ctx.lineWidth = 4 * scale;
  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.moveTo(rw.x + wr*0.3, cy - 10*scale);
  ctx.lineTo(cx - 10*scale, cy - 40*scale);
  ctx.lineTo(cx + 20*scale, cy - 40*scale);
  ctx.lineTo(fw.x - wr*0.3, cy - 10*scale);
  ctx.stroke();

  // Seat
  ctx.lineWidth = 6 * scale;
  ctx.strokeStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(cx - 35*scale, cy - 38*scale);
  ctx.lineTo(cx + 10*scale, cy - 42*scale);
  ctx.stroke();

  // Forks
  ctx.lineWidth = 3 * scale;
  ctx.strokeStyle = `${color}aa`;
  ctx.beginPath();
  ctx.moveTo(cx + 20*scale, cy - 38*scale);
  ctx.lineTo(fw.x - wr*0.2, cy - 8*scale);
  ctx.stroke();

  // Handlebars
  ctx.lineWidth = 3 * scale;
  ctx.strokeStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(cx + 15*scale, cy - 50*scale);
  ctx.lineTo(cx + 30*scale, cy - 55*scale);
  ctx.stroke();

  // Engine block
  ctx.fillStyle = `${color}30`;
  ctx.fillRect(cx - 20*scale, cy - 30*scale, 35*scale, 22*scale);
  ctx.strokeStyle = `${color}60`;
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 20*scale, cy - 30*scale, 35*scale, 22*scale);

  // Ground shadow
  const shadow = ctx.createLinearGradient(cx - 70*scale, cy + wr, cx + 70*scale, cy + wr + 10*scale);
  shadow.addColorStop(0, 'transparent');
  shadow.addColorStop(0.5, `${color}20`);
  shadow.addColorStop(1, 'transparent');
  ctx.fillStyle = shadow;
  ctx.fillRect(cx - 80*scale, cy + wr - 2*scale, 160*scale, 12*scale);

  // Dust particles
  for(let i = 0; i < 12; i++) {
    const px = rw.x - wr + Math.random() * wr * 2;
    const py = cy + wr - Math.random() * 20 * scale;
    ctx.beginPath();
    ctx.arc(px, py, Math.random() * 2, 0, Math.PI*2);
    ctx.fillStyle = `${color}20`;
    ctx.fill();
  }
}

function initHeroCanvas() {
  const canvas = document.getElementById('hero-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const trails_anim = [
    { points: [{x:0.05,y:0.7},{x:0.2,y:0.6},{x:0.4,y:0.65},{x:0.6,y:0.55},{x:0.8,y:0.6},{x:0.95,y:0.65}], color:'rgba(255,107,0,0.4)', width:2.5, speed:0.3 },
    { points: [{x:0.1,y:0.85},{x:0.25,y:0.75},{x:0.45,y:0.8},{x:0.65,y:0.7},{x:0.85,y:0.75}], color:'rgba(255,107,0,0.2)', width:1.5, speed:0.5 },
    { points: [{x:0.0,y:0.9},{x:0.3,y:0.82},{x:0.55,y:0.88},{x:0.75,y:0.78},{x:1.0,y:0.84}], color:'rgba(200,184,154,0.15)', width:1, speed:0.7 },
  ];

  let t = 0;
  function draw() {
    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0,0,W,H);

    // Stars
    for(let i = 0; i < 120; i++) {
      const x = (Math.sin(i * 7.3) * 0.5 + 0.5) * W;
      const y = (Math.cos(i * 3.7) * 0.5 + 0.5) * H * 0.6;
      const alpha = (Math.sin(t * 0.02 + i * 0.5) + 1) * 0.3 + 0.1;
      const r = Math.sin(i * 2.1) * 0.8 + 1.2;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,245,210,${alpha})`;
      ctx.fill();
    }

    // Horizon glow
    const horizon = ctx.createLinearGradient(0, H*0.45, 0, H*0.75);
    horizon.addColorStop(0,'transparent');
    horizon.addColorStop(0.5,'rgba(255,107,0,0.06)');
    horizon.addColorStop(1,'rgba(180,100,20,0.03)');
    ctx.fillStyle = horizon;
    ctx.fillRect(0, H*0.45, W, H*0.3);

    // Mesquite silhouettes
    const numTrees = 14;
    for(let i = 0; i < numTrees; i++) {
      const sx = (i / numTrees) * W + (Math.sin(i * 2.7) * W * 0.04);
      const sy = H * (0.58 + Math.sin(i * 1.3) * 0.06);
      const sh = H * (0.06 + Math.sin(i * 0.7 + 1) * 0.035);
      drawMesquite(ctx, sx, sy, sh, Math.sin(i * 0.9));
    }

    // Ground
    const ground = ctx.createLinearGradient(0, H*0.62, 0, H);
    ground.addColorStop(0,'rgba(18,12,4,0.95)');
    ground.addColorStop(1,'rgba(10,6,2,1)');
    ctx.fillStyle = ground;
    ctx.fillRect(0, H*0.62, W, H);

    // Animated trail lines
    trails_anim.forEach(trail => {
      const offset = t * trail.speed * 0.001;
      ctx.beginPath();
      trail.points.forEach((p, i) => {
        const x = p.x * W;
        const y = p.y * H + Math.sin(t * 0.01 * trail.speed + i * 0.5) * 3;
        if(i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = trail.color;
      ctx.lineWidth = trail.width;
      ctx.setLineDash([8, 16]);
      ctx.lineDashOffset = -offset * 100;
      ctx.stroke();
      ctx.setLineDash([]);
    });

    t++;
    requestAnimationFrame(draw);
  }
  draw();
}

/* ═══════════════════════════════════
   ANIMATED COUNTER
   ═══════════════════════════════════ */
function animateCounter(el, target, duration=1400) {
  let start = null;
  const step = (ts) => {
    if(!start) start = ts;
    const prog = Math.min((ts - start) / duration, 1);
    const ease = 1 - Math.pow(1 - prog, 3);
    const val = Math.round(ease * target);
    el.textContent = val.toLocaleString();
    if(prog < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function initCounters() {
  const counters = document.querySelectorAll('[data-count]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting && !e.target.dataset.done) {
        e.target.dataset.done = '1';
        animateCounter(e.target, parseInt(e.target.dataset.count));
      }
    });
  }, { threshold: 0.3 });
  counters.forEach(c => observer.observe(c));
}

/* Stat block reveal */
function initStatReveal() {
  const blocks = document.querySelectorAll('.stat-block');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.2 });
  blocks.forEach(b => observer.observe(b));
}

/* ═══════════════════════════════════
   TRAIL THUMBNAIL CANVASES
   ═══════════════════════════════════ */
function renderTrailThumbs() {
  document.querySelectorAll('[data-trail-thumb]').forEach(canvas => {
    const seed = parseInt(canvas.dataset.trailThumb) || 0;
    const color = canvas.dataset.color || '#FF6B00';
    // Slightly delay to ensure layout complete
    requestAnimationFrame(() => {
      canvas.width  = canvas.offsetWidth  || canvas.parentElement.offsetWidth || 400;
      canvas.height = canvas.offsetHeight || 200;
      drawDesertScene(canvas, seed);

      // Draw overlay badge color strip
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, canvas.height - 60, 0, canvas.height);
      gradient.addColorStop(0, 'transparent');
      gradient.addColorStop(1, `${color}30`);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
  });
}

function renderBikeThumbs() {
  document.querySelectorAll('[data-bike-thumb]').forEach(canvas => {
    const idx = parseInt(canvas.dataset.bikeThumb);
    const colors = ['#e2332b', '#e2332b', '#FF6B00'];
    requestAnimationFrame(() => {
      canvas.width  = canvas.offsetWidth  || 380;
      canvas.height = canvas.offsetHeight || 180;
      drawBikeIllustration(canvas, colors[idx] || '#FF6B00', idx * 100);
    });
  });
}

/* ═══════════════════════════════════
   DIFFICULTY HELPERS
   ═══════════════════════════════════ */
function diffBadge(d) {
  const map = { beginner:'badge-beginner', intermediate:'badge-intermediate', advanced:'badge-advanced', expert:'badge-expert' };
  return `<span class="badge ${map[d] || 'badge-beginner'}"><span class="terrain-dot"></span>${d.charAt(0).toUpperCase() + d.slice(1)}</span>`;
}

function avatarHTML(initials, color, size=36) {
  return `<div class="record-avatar" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${color},${darken(color)});font-size:${size*0.38}px">${initials}</div>`;
}

function darken(hex) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n>>16) - 40);
  const g = Math.max(0, ((n>>8)&255) - 40);
  const b = Math.max(0, (n&255) - 40);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function starRating(n) {
  return '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));
}

    zoomControl: true,

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(leafletMap);

  DATA.trails.forEach(trail => {

      color: trail.color,
      weight: 4,
      opacity: 0.8,
      dashArray: trail.difficulty === 'advanced' ? '6,4' : null,

    line.on('mouseover', () => line.setStyle({ weight: 7, opacity: 1 }));

     .on('click', () => showMapSidebar(trail));

  // Focus map on trail

  }
}

function closeSidebar() {
  document.getElementById('map-sidebar').classList.add('hidden');
}

function focusTrail(id) {
  const trail = DATA.trails.find(t => t.id === id);
  if(trail) showMapSidebar(trail);

function mapSearch(val) {
  const v = val.toLowerCase();
  if(!v) return;
  const trail = DATA.trails.find(t => t.name.toLowerCase().includes(v));
  if(trail) showMapSidebar(trail);
}

function toggleLike(id, btn) {
  const post = DATA.posts.find(p => p.id === id);
  post.liked = !post.liked;
  post.likes += post.liked ? 1 : -1;
  btn.innerHTML = `<span>${post.liked?'❤️':'🤍'}</span> ${post.likes}`;
  btn.classList.toggle('liked', post.liked);
}

function adminNav(section, btn) {
  document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('admin-main');
  if(section === 'overview') el.innerHTML = renderAdminOverview();
  else if(section === 'trails') el.innerHTML = renderAdminTrails();
  else if(section === 'users') el.innerHTML = renderAdminUsers();
  else if(section === 'submissions') el.innerHTML = renderAdminSubmissions();
  else el.innerHTML = `<div style="font-family:var(--font-display);font-size:28px;color:var(--gray-3);margin-top:40px">${section.toUpperCase()} — Coming Soon</div>`;
}

/* ═══════════════════════════════════
   MODAL
   ═══════════════════════════════════ */
function openSubmitModal() {
  document.getElementById('submit-modal').classList.remove('hidden');
  document.getElementById('submit-form-body').style.display = 'flex';
  document.getElementById('submit-footer').style.display = 'flex';
  document.getElementById('submit-success').classList.remove('show');
  document.body.style.overflow = 'hidden';
}

function closeSubmitModal() {
  document.getElementById('submit-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if(e.target === document.getElementById('submit-modal')) closeSubmitModal();
}

function submitTime() {
  const trail = document.getElementById('submit-trail').value;
  if(!trail) { showToast('Please select a trail', '⚠️', 'error'); return; }
  const min = document.getElementById('time-min').value;
  if(!min) { showToast('Please enter your lap time', '⚠️', 'error'); return; }

  document.getElementById('submit-form-body').style.display = 'none';
  document.getElementById('submit-footer').style.display = 'none';
  document.getElementById('submit-success').classList.add('show');
}

/* ═══════════════════════════════════
   TOAST
   ═══════════════════════════════════ */
function showToast(message, icon='🏍', type='') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span style="font-size:18px">${icon}</span><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'fadeIn 0.3s ease reverse';
    setTimeout(() => toast.remove(), 280);
  }, 3200);
}

/* ═══════════════════════════════════
   MOBILE MENU
   ═══════════════════════════════════ */
function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const ham  = document.getElementById('hamburger');
  menu.classList.toggle('open');
  const spans = ham.querySelectorAll('span');
  if(menu.classList.contains('open')) {
    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
  } else {
    spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
  }
}

function closeMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const ham  = document.getElementById('hamburger');
  menu.classList.remove('open');
  ham.querySelectorAll('span').forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
}

/* Scroll nav */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
});
